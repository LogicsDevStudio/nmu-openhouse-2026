<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน NMU Openhouse 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .register-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="register-container">
        <h2 class="text-center mb-4 text-primary">ลงทะเบียน NMU Openhouse 2026</h2>
        <form id="registerForm">
            <div class="mb-3">
                <label for="nationalId" class="form-label">เลขบัตรประจำตัวประชาชน (13 หลัก)</label>
                <input type="text" class="form-control" id="nationalId" name="nationalId" required maxlength="13">
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="firstName" class="form-label">ชื่อ</label>
                    <input type="text" class="form-control" id="firstName" name="firstName" required>
                </div>
                <div class="col-md-6">
                    <label for="lastName" class="form-label">นามสกุล</label>
                    <input type="text" class="form-control" id="lastName" name="lastName" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">เบอร์โทรศัพท์ที่ติดต่อได้</label>
                <input type="tel" class="form-control" id="phone" name="phone" required>
            </div>
            <div class="mb-4">
                <label for="email" class="form-label">อีเมล</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submitBtn">ยืนยันการลงทะเบียน</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // 1. นำค่า config จาก Firebase มาใส่ที่นี่
    const firebaseConfig = {
      apiKey: "AIzaSyCyhE_45kz9JzquKe5AaotnyvcU30g9AQQ",
      authDomain: "nmuopenhouse-2026.firebaseapp.com",
      projectId: "nmuopenhouse-2026",
      storageBucket: "nmuopenhouse-2026.firebasestorage.app",
      messagingSenderId: "961659821884",
      appId: "1:961659821884:web:6162a1acb7ae96f7e98839"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. นำ URL จาก Google Apps Script มาใส่ที่นี่
    const GOOGLE_SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL";

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "กำลังบันทึกข้อมูล...";

        // ดึงข้อมูลจากฟอร์ม
        const formData = {
            nationalId: document.getElementById('nationalId').value,
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            timestamp: new Date()
        };

        try {
            // ส่งข้อมูลเข้า Firebase Firestore
            await addDoc(collection(db, "registrations"), formData);

            // ส่งข้อมูลเข้า Google Sheets (ผ่าน URLSearchParams เพื่อให้ Apps Script อ่านค่าได้)
            const urlParams = new URLSearchParams();
            urlParams.append('nationalId', formData.nationalId);
            urlParams.append('firstName', formData.firstName);
            urlParams.append('lastName', formData.lastName);
            urlParams.append('phone', formData.phone);
            urlParams.append('email', formData.email);

            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: urlParams
            });

            alert("ลงทะเบียนสำเร็จ!");
            document.getElementById('registerForm').reset();
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("เกิดข้อผิดพลาดในการลงทะเบียน กรุณาลองใหม่อีกครั้ง");
        } finally {
            btn.disabled = false;
            btn.innerText = "ยืนยันการลงทะเบียน";
        }
    });
</script>

</body>
</html>
