<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMU Openhouse 2026 - System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .hidden { display: none; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">NMU Openhouse 2026</a>
        <button class="btn btn-outline-light btn-sm" onclick="toggleAdmin()">สำหรับเจ้าหน้าที่</button>
    </div>
</nav>

<div class="container">
    <div id="registrationSection" class="row justify-content-center">
        <div class="col-md-6 card p-4">
            <h3 class="text-center mb-4">ลงทะเบียนเข้างาน</h3>
            <form id="registerForm">
                <div class="mb-3"><input type="text" class="form-control" id="nationalId" placeholder="เลขบัตรประชาชน" required></div>
                <div class="row mb-3">
                    <div class="col"><input type="text" class="form-control" id="firstName" placeholder="ชื่อ" required></div>
                    <div class="col"><input type="text" class="form-control" id="lastName" placeholder="นามสกุล" required></div>
                </div>
                <div class="mb-3"><input type="tel" class="form-control" id="phone" placeholder="เบอร์โทรศัพท์" required></div>
                <div class="mb-3"><input type="email" class="form-control" id="email" placeholder="อีเมล" required></div>
                <button type="submit" class="btn btn-primary w-100" id="regBtn">ลงทะเบียน</button>
            </form>
        </div>
    </div>

    <div id="loginSection" class="row justify-content-center hidden">
        <div class="col-md-4 card p-4">
            <h3 class="text-center mb-4">Admin Login</h3>
            <div class="mb-3"><input type="text" id="adminUser" class="form-control" placeholder="Username"></div>
            <div class="mb-3"><input type="password" id="adminPass" class="form-control" placeholder="Password"></div>
            <button class="btn btn-dark w-100" onclick="handleLogin()">เข้าสู่ระบบ</button>
            <button class="btn btn-link w-100 mt-2" onclick="toggleAdmin()">กลับหน้าลงทะเบียน</button>
        </div>
    </div>

    <div id="dashboardSection" class="row hidden">
        <div class="col-12 card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>รายชื่อผู้ลงทะเบียน</h3>
                <button class="btn btn-danger btn-sm" onclick="location.reload()">Log Out</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL"; // ใส่ URL ที่ได้จากขั้นตอนที่ 2

    // สลับหน้าจอ
    function toggleAdmin() {
        document.getElementById('registrationSection').classList.toggle('hidden');
        document.getElementById('loginSection').classList.toggle('hidden');
    }

    // จัดการการ Login
    async function handleLogin() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        
        const params = new URLSearchParams();
        params.append('action', 'login');
        params.append('user', user);
        params.append('pass', pass);

        try {
            const resp = await fetch(SCRIPT_URL, { method: 'POST', body: params });
            const data = await resp.json();

            if (data.result === "authorized") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                loadData();
            } else {
                alert("Username หรือ Password ไม่ถูกต้อง");
            }
        } catch (e) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
    }

    // ดึงข้อมูลจาก Google Sheets มาแสดง
    async function loadData() {
        const resp = await fetch(SCRIPT_URL);
        const data = await resp.json();
        
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        
        // สร้างหัวตาราง
        head.innerHTML = data[0].map(h => `<th>${h}</th>`).join('');
        
        // สร้างข้อมูลในตาราง
        body.innerHTML = data.slice(1).map(row => `
            <tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>
        `).join('');
    }

    // ฟังก์ชันลงทะเบียน (เหมือนโปรเจกต์เดิม)
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        btn.disabled = true;

        const params = new URLSearchParams();
        params.append('action', 'register');
        params.append('nationalId', document.getElementById('nationalId').value);
        params.append('firstName', document.getElementById('firstName').value);
        params.append('lastName', document.getElementById('lastName').value);
        params.append('phone', document.getElementById('phone').value);
        params.append('email', document.getElementById('email').value);

        await fetch(SCRIPT_URL, { method: 'POST', body: params });
        alert("ลงทะเบียนเรียบร้อย!");
        location.reload();
    });
</script>

</body>
</html>
