<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMU Openhouse 2026 - System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
        .hidden { display: none; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .navbar { margin-bottom: 30px; }
        .page-link { cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="showSection('registrationSection')">NMU Openhouse 2026</a>
        <button class="btn btn-outline-light btn-sm" id="adminBtn" onclick="showSection('loginSection')">สำหรับเจ้าหน้าที่</button>
        <button class="btn btn-danger btn-sm hidden" id="logoutBtn" onclick="handleLogout()">ออกจากระบบ</button>
    </div>
</nav>

<div class="container mb-5">
    
    <div id="registrationSection" class="row justify-content-center">
        <div class="col-md-6 card p-4">
            <h2 class="text-center mb-4 text-primary">ลงทะเบียนเข้างาน</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">เลขบัตรประจำตัวประชาชน (13 หลัก)</label>
                    <input type="text" class="form-control" id="nationalId" required maxlength="13" pattern="\d{13}" title="โปรดกรอกตัวเลข 13 หลัก">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">ชื่อ</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">นามสกุล</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">เบอร์โทรศัพท์</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">อีเมล</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">ยืนยันการลงทะเบียน</button>
            </form>
        </div>
    </div>

    <div id="loginSection" class="row justify-content-center hidden">
        <div class="col-md-4 card p-4">
            <h3 class="text-center mb-4">Admin Login</h3>
            <div class="mb-3">
                <input type="text" id="adminUser" class="form-control" placeholder="ชื่อผู้ใช้งาน">
            </div>
            <div class="mb-3">
                <input type="password" id="adminPass" class="form-control" placeholder="รหัสผ่าน">
            </div>
            <button class="btn btn-dark w-100" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ</button>
            <button class="btn btn-link w-100 mt-2" onclick="showSection('registrationSection')">กลับหน้าลงทะเบียน</button>
        </div>
    </div>

    <div id="dashboardSection" class="row hidden">
        <div class="col-12 card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>รายชื่อผู้ลงทะเบียน (Real-time)</h3>
                <div class="d-flex align-items-center">
                    <span class="me-2">แสดง</span>
                    <select class="form-select form-select-sm w-auto" id="pageSizeSelect" onchange="window.changePageSize(this.value)">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span class="ms-2">แถว</span>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ลำดับ</th>
                            <th>วัน-เวลา</th>
                            <th>ชื่อ-นามสกุล</th>
                            <th>เบอร์โทรศัพท์</th>
                            <th>อีเมล</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="text-center">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <div id="paginationInfo">แสดง 0 ถึง 0 จาก 0 รายการ</div>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="paginationNav">
                        </ul>
                </nav>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // เพิ่ม getDocs และ where สำหรับการ Query เช็กข้อมูลซ้ำ
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyhE_45kz9JzquKe5AaotnyvcU30g9AQQ",
        authDomain: "nmuopenhouse-2026.firebaseapp.com",
        projectId: "nmuopenhouse-2026",
        storageBucket: "nmuopenhouse-2026.firebasestorage.app",
        messagingSenderId: "961659821884",
        appId: "1:961659821884:web:6162a1acb7ae96f7e98839"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkjREwxic7mJhHWGmVPFFYTYI1v53sgy-JvtsjL5TwjtFnbYUeu1fnVCI8-lHOf3RCjA/exec";

    let allData = []; 
    let currentPage = 1;
    let pageSize = 10;

    // --- ฟังก์ชันตรวจสอบความถูกต้องของเลขบัตรประชาชน 13 หลัก ---
    function validateThaiNationalID(id) {
        if(id == null || id.length !== 13 || !/^[0-9]+$/.test(id)) return false;
        let sum = 0;
        for(let i = 0; i < 12; i++) {
            sum += parseInt(id.charAt(i)) * (13 - i);
        }
        let mod = sum % 11;
        let check = (11 - mod) % 10;
        return check === parseInt(id.charAt(12));
    }

    // --- การลงทะเบียน ---
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nationalId = document.getElementById('nationalId').value;
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;

        // 1. ตรวจสอบรูปแบบเลขบัตรประชาชน
        if (!validateThaiNationalID(nationalId)) {
            Swal.fire({
                icon: 'error',
                title: 'ข้อมูลไม่ถูกต้อง',
                text: 'เลขบัตรประจำตัวประชาชนไม่ถูกต้องตามรูปแบบ กรุณาตรวจสอบอีกครั้ง'
            });
            return;
        }

        // แสดง Loading ตอนกำลังเช็กข้อมูล
        Swal.fire({
            title: 'กำลังตรวจสอบข้อมูล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            // 2. เช็กว่าเลขบัตรประชาชนซ้ำหรือไม่
            const idQuery = query(collection(db, "registrations"), where("nationalId", "==", nationalId));
            const idSnapshot = await getDocs(idQuery);
            if (!idSnapshot.empty) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลซ้ำ', text: 'เลขบัตรประจำตัวประชาชนนี้ ถูกใช้ลงทะเบียนไปแล้ว' });
                return;
            }

            // 3. เช็กว่าอีเมลซ้ำหรือไม่
            const emailQuery = query(collection(db, "registrations"), where("email", "==", email));
            const emailSnapshot = await getDocs(emailQuery);
            if (!emailSnapshot.empty) {
                Swal.fire({ icon: 'warning', title: 'ข้อมูลซ้ำ', text: 'อีเมลนี้ ถูกใช้ลงทะเบียนไปแล้ว' });
                return;
            }

            // หากผ่านทั้งหมด เปลี่ยนข้อความ Loading เป็นกำลังบันทึก
            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const formData = {
                nationalId: nationalId,
                firstName: firstName,
                lastName: lastName,
                phone: phone,
                email: email,
                timestamp: new Date()
            };

            // บันทึก Firebase
            await addDoc(collection(db, "registrations"), formData);
            
            // บันทึก Google Sheet
            const urlParams = new URLSearchParams();
            urlParams.append('action', 'register');
            urlParams.append('nationalId', formData.nationalId);
            urlParams.append('firstName', formData.firstName);
            urlParams.append('lastName', formData.lastName);
            urlParams.append('phone', formData.phone);
            urlParams.append('email', formData.email);

            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: urlParams });
            
            // แจ้งเตือนเมื่อสำเร็จ
            Swal.fire({
                icon: 'success',
                title: 'สำเร็จ!',
                text: 'ลงทะเบียนเข้างาน NMU Openhouse 2026 เรียบร้อยแล้ว',
                confirmButtonText: 'ตกลง'
            }).then(() => {
                document.getElementById('registerForm').reset();
            });

        } catch (error) {
            console.error(error);
            Swal.fire({
                icon: 'error',
                title: 'เกิดข้อผิดพลาด',
                text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง หรือติดต่อเจ้าหน้าที่'
            });
        }
    });

    // --- ระบบ Real-time Dashboard (เหมือนเดิม) ---
    function initRealtimeData() {
        const q = query(collection(db, "registrations"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allData = [];
            snapshot.forEach((doc) => {
                allData.push(doc.data());
            });
            renderTable();
        });
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        const totalItems = allData.length;
        const totalPages = Math.ceil(totalItems / pageSize);

        if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;

        const startIdx = (currentPage - 1) * pageSize;
        const endIdx = Math.min(startIdx + pageSize, totalItems);
        const displayData = allData.slice(startIdx, endIdx);

        if (totalItems === 0) {
            body.innerHTML = '<tr><td colspan="5" class="text-center">ยังไม่มีผู้ลงทะเบียน</td></tr>';
            return;
        }

        body.innerHTML = displayData.map((data, index) => {
            const time = data.timestamp?.toDate ? data.timestamp.toDate().toLocaleString('th-TH') : '-';
            return `
                <tr>
                    <td>${startIdx + index + 1}</td>
                    <td>${time}</td>
                    <td>${data.firstName} ${data.lastName}</td>
                    <td>${data.phone}</td>
                    <td>${data.email}</td>
                </tr>
            `;
        }).join('');

        updatePaginationUI(totalItems, totalPages, startIdx, endIdx);
    }

    function updatePaginationUI(totalItems, totalPages, startIdx, endIdx) {
        document.getElementById('paginationInfo').innerText = `แสดง ${totalItems > 0 ? startIdx + 1 : 0} ถึง ${endIdx} จาก ${totalItems} รายการ`;
        const nav = document.getElementById('paginationNav');
        let navHtml = `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" onclick="window.changePage(${currentPage - 1})">ย้อนกลับ</a>
            </li>
        `;
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                navHtml += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" onclick="window.changePage(${i})">${i}</a></li>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                navHtml += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
            }
        }
        navHtml += `
            <li class="page-item ${currentPage === totalPages || totalItems === 0 ? 'disabled' : ''}">
                <a class="page-link" onclick="window.changePage(${currentPage + 1})">ถัดไป</a>
            </li>
        `;
        nav.innerHTML = navHtml;
    }

    // --- Window functions ---
    window.showSection = (sectionId) => {
        ['registrationSection', 'loginSection', 'dashboardSection'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(sectionId).classList.remove('hidden');
    };

    window.handleLogin = async () => {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;

        if (!user || !pass) {
            Swal.fire({ icon: 'warning', title: 'แจ้งเตือน', text: 'กรุณากรอกชื่อผู้ใช้งานและรหัสผ่านให้ครบถ้วน' });
            return;
        }

        Swal.fire({
            title: 'กำลังเข้าสู่ระบบ...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        const params = new URLSearchParams();
        params.append('action', 'login');
        params.append('user', user);
        params.append('pass', pass);

        try {
            const resp = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: params });
            const data = await resp.json();

            if (data.result === "authorized") {
                Swal.close(); // ปิด loading
                showSection('dashboardSection');
                document.getElementById('adminBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                initRealtimeData();
            } else {
                Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบล้มเหลว', text: 'ชื่อผู้ใช้งาน หรือ รหัสผ่าน ไม่ถูกต้อง' });
            }
        } catch (e) {
            Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถเชื่อมต่อระบบได้ กรุณาลองใหม่' });
        }
    };

    window.changePage = (page) => {
        currentPage = page;
        renderTable();
    };

    window.changePageSize = (size) => {
        pageSize = parseInt(size);
        currentPage = 1;
        renderTable();
    };

    window.handleLogout = () => {
        Swal.fire({
            title: 'ยืนยันการออกจากระบบ?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'ออกจากระบบ',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#dc3545'
        }).then((result) => {
            if (result.isConfirmed) {
                location.reload();
            }
        });
    };

</script>

</body>
</html>
