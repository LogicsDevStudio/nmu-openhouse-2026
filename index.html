<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMU Openhouse 2026 - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
        .hidden { display: none; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .table-container { min-height: 400px; }
        .pagination-container { display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="location.reload()">NMU Openhouse 2026 System</a>
        <button class="btn btn-danger btn-sm hidden" id="logoutBtn" onclick="location.reload()">ออกจากระบบ</button>
    </div>
</nav>

<div class="container">
    <div id="loginSection" class="row justify-content-center">
        <div class="col-md-4 card p-4">
            <h3 class="text-center mb-4">Admin Login</h3>
            <div class="mb-3"><input type="text" id="adminUser" class="form-control" placeholder="ชื่อผู้ใช้งาน"></div>
            <div class="mb-3"><input type="password" id="adminPass" class="form-control" placeholder="รหัสผ่าน"></div>
            <button class="btn btn-dark w-100" onclick="handleLogin()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="dashboardSection" class="row hidden">
        <div class="col-12 card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4>รายชื่อผู้ลงทะเบียน (Real-time จาก Firebase)</h4>
                <div class="d-flex align-items-center gap-2">
                    <span>แสดง:</span>
                    <select id="rowsPerPage" class="form-select form-select-sm" style="width: auto;" onchange="changeRowsPerPage()">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive table-container">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>วัน-เวลา</th>
                            <th>เลขบัตรประชาชน</th>
                            <th>ชื่อ-นามสกุล</th>
                            <th>เบอร์โทรศัพท์</th>
                            <th>อีเมล</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="text-center">กำลังรอข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-container mt-3">
                <span id="pageInfo">หน้า 1 จาก 1</span>
                <nav>
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item"><button class="page-link" onclick="prevPage()">ก่อนหน้า</button></li>
                        <li class="page-item"><button class="page-link" onclick="nextPage()">ถัดไป</button></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyhE_45kz9JzquKe5AaotnyvcU30g9AQQ",
        authDomain: "nmuopenhouse-2026.firebaseapp.com",
        projectId: "nmuopenhouse-2026",
        storageBucket: "nmuopenhouse-2026.firebasestorage.app",
        messagingSenderId: "961659821884",
        appId: "1:961659821884:web:6162a1acb7ae96f7e98839"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkjREwxic7mJhHWGmVPFFYTYI1v53sgy-JvtsjL5TwjtFnbYUeu1fnVCI8-lHOf3RCjA/exec";

    // ตัวแปรสำหรับ Pagination
    let allData = [];
    let currentPage = 1;
    let rowsPerPage = 10;

    // ระบบ Login (ดึงจาก Google Sheet เหมือนเดิม)
    window.handleLogin = async () => {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        const params = new URLSearchParams();
        params.append('action', 'login');
        params.append('user', user);
        params.append('pass', pass);

        try {
            const resp = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: params });
            const data = await resp.json();
            if (data.result === "authorized") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                initRealtimeData(); // เริ่มดึงข้อมูล Real-time
            } else {
                alert("Login ล้มเหลว");
            }
        } catch (e) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
    };

    // ฟังก์ชันดึงข้อมูลแบบ Real-time จาก Firebase
    function initRealtimeData() {
        const q = query(collection(db, "registrations"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            allData = [];
            snapshot.forEach((doc) => {
                const item = doc.data();
                // แปลง Timestamp ของ Firebase เป็นวันที่อ่านออก
                const date = item.timestamp ? item.timestamp.toDate().toLocaleString('th-TH') : '-';
                allData.push({ ...item, displayDate: date });
            });
            renderTable();
        });
    }

    // ฟังก์ชันแสดงผลตารางตามหน้าปัจจุบัน
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = allData.slice(start, end);

        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">ไม่มีข้อมูลลงทะเบียน</td></tr>';
        } else {
            tbody.innerHTML = pageData.map(row => `
                <tr>
                    <td>${row.displayDate}</td>
                    <td>${row.nationalId}</td>
                    <td>${row.firstName} ${row.lastName}</td>
                    <td>${row.phone}</td>
                    <td>${row.email}</td>
                </tr>
            `).join('');
        }

        updatePaginationUI();
    }

    // ฟังก์ชันจัดการ UI ของ Pagination
    function updatePaginationUI() {
        const totalPages = Math.ceil(allData.length / rowsPerPage) || 1;
        document.getElementById('pageInfo').innerText = `หน้า ${currentPage} จาก ${totalPages} (ทั้งหมด ${allData.length} รายการ)`;
    }

    // Event Functions
    window.changeRowsPerPage = () => {
        rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
        currentPage = 1;
        renderTable();
    };

    window.prevPage = () => {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    };

    window.nextPage = () => {
        const totalPages = Math.ceil(allData.length / rowsPerPage);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    };
</script>

</body>
</html>
