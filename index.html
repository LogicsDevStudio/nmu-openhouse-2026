<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMU Openhouse 2026 - System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
        .hidden { display: none; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .navbar { margin-bottom: 30px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="showSection('registrationSection')">NMU Openhouse 2026</a>
        <button class="btn btn-outline-light btn-sm" id="adminBtn" onclick="showSection('loginSection')">สำหรับเจ้าหน้าที่</button>
        <button class="btn btn-danger btn-sm hidden" id="logoutBtn" onclick="handleLogout()">ออกจากระบบ</button>
    </div>
</nav>

<div class="container">
    
    <div id="registrationSection" class="row justify-content-center">
        <div class="col-md-6 card p-4">
            <h2 class="text-center mb-4 text-primary">ลงทะเบียนเข้างาน</h2>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">เลขบัตรประจำตัวประชาชน (13 หลัก)</label>
                    <input type="text" class="form-control" id="nationalId" required maxlength="13">
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">ชื่อ</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">นามสกุล</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">เบอร์โทรศัพท์</label>
                    <input type="tel" class="form-control" id="phone" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">อีเมล</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">ยืนยันการลงทะเบียน</button>
            </form>
        </div>
    </div>

    <div id="loginSection" class="row justify-content-center hidden">
        <div class="col-md-4 card p-4">
            <h3 class="text-center mb-4">Admin Login</h3>
            <div class="mb-3">
                <input type="text" id="adminUser" class="form-control" placeholder="ชื่อผู้ใช้งาน">
            </div>
            <div class="mb-3">
                <input type="password" id="adminPass" class="form-control" placeholder="รหัสผ่าน">
            </div>
            <button class="btn btn-dark w-100" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ</button>
            <button class="btn btn-link w-100 mt-2" onclick="showSection('registrationSection')">กลับหน้าลงทะเบียน</button>
        </div>
    </div>

    <div id="dashboardSection" class="row hidden">
        <div class="col-12 card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>รายชื่อผู้ลงทะเบียน</h3>
                <button class="btn btn-success btn-sm" onclick="loadData()">รีเฟรชข้อมูล</button>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="text-center">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCyhE_45kz9JzquKe5AaotnyvcU30g9AQQ",
        authDomain: "nmuopenhouse-2026.firebaseapp.com",
        projectId: "nmuopenhouse-2026",
        storageBucket: "nmuopenhouse-2026.firebasestorage.app",
        messagingSenderId: "961659821884",
        appId: "1:961659821884:web:6162a1acb7ae96f7e98839"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwkjREwxic7mJhHWGmVPFFYTYI1v53sgy-JvtsjL5TwjtFnbYUeu1fnVCI8-lHOf3RCjA/exec";

    // ฟังก์ชันจัดการการลงทะเบียน
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "กำลังบันทึกข้อมูล...";

        const formData = {
            nationalId: document.getElementById('nationalId').value,
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "registrations"), formData);
            const urlParams = new URLSearchParams();
            urlParams.append('action', 'register');
            urlParams.append('nationalId', formData.nationalId);
            urlParams.append('firstName', formData.firstName);
            urlParams.append('lastName', formData.lastName);
            urlParams.append('phone', formData.phone);
            urlParams.append('email', formData.email);

            await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: urlParams });
            alert("ลงทะเบียนสำเร็จ!");
            document.getElementById('registerForm').reset();
        } catch (error) {
            alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
        } finally {
            btn.disabled = false;
            btn.innerText = "ยืนยันการลงทะเบียน";
        }
    });

    // ทำให้ฟังก์ชันอื่นๆ เรียกใช้ได้จากภายนอก module
    window.showSection = (sectionId) => {
        ['registrationSection', 'loginSection', 'dashboardSection'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(sectionId).classList.remove('hidden');
    };

    window.handleLogin = async () => {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        const btn = document.getElementById('loginBtn');
        
        btn.disabled = true;
        btn.innerText = "กำลังตรวจสอบ...";

        const params = new URLSearchParams();
        params.append('action', 'login');
        params.append('user', user);
        params.append('pass', pass);

        try {
            const resp = await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: params });
            const data = await resp.json();

            if (data.result === "authorized") {
                showSection('dashboardSection');
                document.getElementById('adminBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                loadData();
            } else {
                alert("Username หรือ Password ไม่ถูกต้อง");
            }
        } catch (e) {
            alert("การเชื่อมต่อผิดพลาด");
        } finally {
            btn.disabled = false;
            btn.innerText = "เข้าสู่ระบบ";
        }
    };

    window.loadData = async () => {
        try {
            const resp = await fetch(GOOGLE_SCRIPT_URL);
            const data = await resp.json();
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            head.innerHTML = data[0].map(h => `<th>${h}</th>`).join('');
            body.innerHTML = data.slice(1).map(row => `
                <tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>
            `).join('');
        } catch (e) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="6">ไม่สามารถโหลดข้อมูลได้</td></tr>';
        }
    };

    window.handleLogout = () => {
        location.reload();
    };
</script>

</body>
</html>
